version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: micro-es-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: searchdb
    ports:
      - "5432:5432"

  micro-es:
    build: .
    container_name: micro-es-engine
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://postgres:password@db:5432/searchdb?sslmode=disable
    depends_on:
      - db
    restart: unless-stopped
